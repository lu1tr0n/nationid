name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      # changesets/action needs `contents: write` to push tags and the
      # release commit, `pull-requests: write` to open the release PR,
      # and `id-token: write` for the OIDC identity used by both npm
      # Trusted Publishing (replaces NPM_TOKEN) and sigstore provenance.
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify pipeline
        run: pnpm verify

      - name: Create release PR or publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          # `pnpm run version` not `pnpm version` — the latter is pnpm's built-in
          # npm-style version-manipulation command and silently no-ops here,
          # leaving changeset files unconsumed. Same trap on `publish`.
          version: pnpm run version
          publish: pnpm run release
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
