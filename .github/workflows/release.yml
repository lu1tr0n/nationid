name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      # changesets/action needs `contents: write` to push tags and the
      # release commit, `pull-requests: write` to open the release PR,
      # and `id-token: write` for the OIDC identity used by both npm
      # Trusted Publishing (replaces NPM_TOKEN) and sigstore provenance.
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm CLI for Trusted Publisher OIDC
        # Node 22 LTS ships with npm 10.x. npm Trusted Publishing requires
        # npm 11.5.1+ for the OIDC token exchange against the npm registry.
        # Without this, changesets/action detects OIDC and tries to use it,
        # but the underlying `npm publish` (v10) falls back to anonymous
        # auth and the registry returns 404 ("auth missing", masked).
        # Pinned (not @latest) so Scorecard's Pinned-Dependencies check passes
        # and publish behaviour stays reproducible; bump deliberately.
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify pipeline
        run: pnpm verify

      - name: Create release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # `pnpm run version` not `pnpm version` — the latter is pnpm's built-in
          # npm-style version-manipulation command and silently no-ops here,
          # leaving changeset files unconsumed. Same trap on `publish`.
          version: pnpm run version
          publish: pnpm run release
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
